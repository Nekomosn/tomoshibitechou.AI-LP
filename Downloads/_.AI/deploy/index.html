const { useState, useEffect, useRef, useCallback } = React;

/* ── helpers ── */
function useReveal(delay=0) {
  const ref = useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const t = setTimeout(()=>{
      const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting) el.classList.add('visible'); },{threshold:.12});
      obs.observe(el);
      return ()=>obs.disconnect();
    }, delay);
    return ()=>clearTimeout(t);
  },[delay]);
  return ref;
}

/* ── Stars ── */
function Stars({count=60}) {
  const stars = useRef([...Array(count)].map(()=>({
    x:Math.random()*100,y:Math.random()*100,
    s:Math.random()*.8+.2,o:Math.random()*.35+.08,
    d:Math.random()*4+2
  }))).current;
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
      {stars.map((s,i)=>(
        <div key={i} className="star" style={{
          left:`${s.x}%`,top:`${s.y}%`,
          width:`${s.s}px`,height:`${s.s}px`,
          opacity:s.o,animation:`twinkle ${s.d}s ease-in-out ${s.d*.3}s infinite`
        }}/>
      ))}
    </div>
  );
}

            {['お問い合わせ','よりそいホットライン','グリーフリソース'].map(l=>(
              <a key={l} href="#" style={{fontSize:12,color:'rgba(218,226,253,.25)',textDecoration:'none',fontFamily:'Public Sans',transition:'color .3s'}}
                onMouseEnter={e=>e.target.style.color='rgba(255,193,116,.6)'} onMouseLeave={e=>e.target.style.color='rgba(218,226,253,.25)'}>{l}</a>
            ))}
          </div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,.03)',paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <p style={{fontSize:11,color:'rgba(218,226,253,.15)',margin:0}}>© 2026 ともしび手帳.AI — The Sanctuary of Light</p>
          <p style={{fontSize:11,color:'rgba(218,226,253,.1)',margin:0,fontFamily:'Noto Serif',fontStyle:'italic'}}>灯りは消えない</p>
        </div>
      </div>
    </footer>
  );
}

/* ── Tweaks ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#ffc174",
  "heroHeadline": "話すたびに、その人の記憶がかたちになっていく。",
  "ctaLabel": "無料で始める",
  "showStars": true
}/*EDITMODE-END*/;

function TweaksPanel({ onClose }) {
  const [vals,setVals]=useState(TWEAK_DEFAULTS);
  const set=(k,v)=>{const n={...vals,[k]:v};setVals(n);window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*');};
  return (
    <div style={{position:'fixed',bottom:90,right:28,width:256,background:'#171f33',border:'1px solid rgba(255,193,116,.15)',borderRadius:12,padding:20,zIndex:200,boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontFamily:'Noto Serif',fontSize:14,color:'#ffc174'}}>Tweaks</span>
        <button onClick={onClose} style={{background:'transparent',border:'none',color:'rgba(216,195,173,.35)',cursor:'pointer',padding:0}}><span className="ms" style={{fontSize:18}}>close</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <label style={{fontSize:11,color:'rgba(216,195,173,.55)'}}>
          アクセントカラー
          <input type="color" value={vals.accentColor} onChange={e=>set('accentColor',e.target.value)}
            style={{display:'block',marginTop:6,width:'100%',height:30,borderRadius:4,border:'1px solid rgba(255,255,255,.08)',background:'transparent',cursor:'pointer'}}/>
        </label>
        <label style={{fontSize:11,color:'rgba(216,195,173,.55)'}}>
          星背景
          <div style={{display:'flex',gap:6,marginTop:6}}>
            {['あり','なし'].map(v=>(
              <button key={v} onClick={()=>set('showStars',v==='あり')} style={{
                flex:1,padding:'6px',borderRadius:6,fontSize:11,cursor:'pointer',
                background:(vals.showStars===(v==='あり'))?'rgba(255,193,116,.09)':'transparent',
                border:`1px solid ${(vals.showStars===(v==='あり'))?'rgba(255,193,116,.25)':'rgba(255,255,255,.07)'}`,
                color:(vals.showStars===(v==='あり'))?'#ffc174':'rgba(216,195,173,.35)',
              }}>{v}</button>
            ))}
          </div>
        </label>
        <label style={{fontSize:11,color:'rgba(216,195,173,.55)'}}>
          CTAボタン文言
          <input type="text" value={vals.ctaLabel} onChange={e=>set('ctaLabel',e.target.value)}
            style={{display:'block',marginTop:6,width:'100%',padding:'7px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.07)',background:'rgba(255,255,255,.02)',color:'#dae2fd',fontSize:12,boxSizing:'border-box'}}/>
        </label>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [tweaksOpen,setTweaksOpen]=useState(false);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);
  return (
    <div style={{background:'#0b1326',color:'#dae2fd',fontFamily:'Public Sans,sans-serif',overflowX:'hidden'}}>
      <Nav/>
      <Hero/>
      <HowItWorks/>
      <MemorialPreview/>
      <Stages/>
      <Story/>
      <CtaSection/>
      <CrisisButton/>
      {tweaksOpen&&<TweaksPanel onClose={()=>setTweaksOpen(false)}/>}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
